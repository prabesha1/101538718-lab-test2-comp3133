# Render Static Site — required dashboard settings (if not using Blueprint sync):
#
#   Root Directory     → leave BLANK (repository root). Never "browser".
#   Build Command      → npm ci && npm run build
#   Publish directory  → dist/out/browser
#
# "browser" only appears AFTER `ng build`, inside dist/out/ — it is not a repo folder.
services:
  - type: web
    name: 101538718-lab-test2-comp3133
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist/out/browser
